<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">Recommended Product Add-to-Cart Sequence</title>
  <desc id="desc">A committed product block records recent products, then cart add verifies recent display and latest product state before returning a cart snapshot.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .head { fill: #ffffff; stroke: #334155; stroke-width: 1.5; rx: 8; }
      .cart { fill: #eef2ff; stroke: #4f46e5; stroke-width: 1.5; rx: 8; }
      .store { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.5; rx: 8; }
      .title { fill: #0f172a; font: 700 20px Arial, sans-serif; }
      .text { fill: #0f172a; font: 600 14px Arial, sans-serif; }
      .small { fill: #334155; font: 12px Arial, sans-serif; }
      .life { stroke: #94a3b8; stroke-width: 1.4; stroke-dasharray: 6 5; }
      .edge { fill: none; stroke: #334155; stroke-width: 1.7; marker-end: url(#arrow); }
      .return { fill: none; stroke: #64748b; stroke-width: 1.5; stroke-dasharray: 6 5; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1040" height="560"/>
  <text class="title" x="40" y="45">Recommended Product Add-to-Cart</text>

  <rect class="head" x="45" y="80" width="150" height="54"/>
  <text class="text" x="93" y="112">Client</text>
  <rect class="head" x="245" y="80" width="150" height="54"/>
  <text class="text" x="294" y="112">FastAPI</text>
  <rect class="head" x="445" y="80" width="150" height="54"/>
  <text class="text" x="483" y="112">sse.mapper</text>
  <rect class="cart" x="645" y="80" width="150" height="54"/>
  <text class="text" x="680" y="112">cart_store</text>
  <rect class="store" x="845" y="80" width="150" height="54"/>
  <text class="text" x="895" y="112">MySQL</text>

  <line class="life" x1="120" y1="134" x2="120" y2="515"/>
  <line class="life" x1="320" y1="134" x2="320" y2="515"/>
  <line class="life" x1="520" y1="134" x2="520" y2="515"/>
  <line class="life" x1="720" y1="134" x2="720" y2="515"/>
  <line class="life" x1="920" y1="134" x2="920" y2="515"/>

  <path class="return" d="M320 175 L120 175"/>
  <text class="small" x="170" y="164">product block</text>
  <path class="edge" d="M320 225 C365 225 365 225 320 225"/>
  <text class="small" x="336" y="214">MessageCommitEvent.recent_products</text>
  <path class="edge" d="M320 275 L720 275"/>
  <text class="small" x="424" y="264">record_recent_product(conversation_id, product)</text>
  <path class="edge" d="M120 335 L320 335"/>
  <text class="small" x="166" y="324">POST /api/cart/items</text>
  <path class="edge" d="M320 385 L720 385"/>
  <text class="small" x="420" y="374">add_item(conversation_id, product_id, quantity)</text>
  <path class="edge" d="M720 430 C770 430 770 462 720 462"/>
  <text class="small" x="738" y="447">verify recently displayed</text>
  <path class="edge" d="M720 485 L920 485"/>
  <text class="small" x="765" y="474">read latest product</text>
  <path class="return" d="M720 515 L320 515"/>
  <text class="small" x="497" y="504">CartSnapshot</text>
  <path class="return" d="M320 535 L120 535"/>
  <text class="small" x="174" y="524">cart snapshot</text>
</svg>
