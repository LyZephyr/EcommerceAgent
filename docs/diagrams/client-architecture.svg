<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">Android Client Architecture</title>
  <desc id="desc">Client-side flow from MainActivity through Compose route, ViewModel, service, API, UI state, and screen.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 1.6; rx: 8; }
      .vm { fill: #eef2ff; stroke: #4f46e5; stroke-width: 1.6; rx: 8; }
      .api { fill: #ecfdf5; stroke: #047857; stroke-width: 1.6; rx: 8; }
      .backend { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.6; rx: 8; }
      .title { fill: #0f172a; font: 700 20px Arial, sans-serif; }
      .text { fill: #0f172a; font: 600 15px Arial, sans-serif; }
      .small { fill: #475569; font: 12px Arial, sans-serif; }
      .edge { fill: none; stroke: #334155; stroke-width: 1.8; marker-end: url(#arrow); }
      .label { fill: #334155; font: 12px Arial, sans-serif; }
    </style>
  </defs>
  <rect class="bg" width="980" height="560"/>
  <text class="title" x="40" y="45">Android Client Architecture</text>

  <rect class="box" x="80" y="95" width="180" height="64"/>
  <text class="text" x="121" y="132">MainActivity</text>

  <rect class="box" x="80" y="215" width="180" height="64"/>
  <text class="text" x="125" y="252">ChatRoute</text>

  <rect class="vm" x="360" y="215" width="190" height="64"/>
  <text class="text" x="404" y="244">ChatViewModel</text>
  <text class="small" x="401" y="264">state + SSE lifecycle</text>

  <rect class="api" x="700" y="145" width="190" height="64"/>
  <text class="text" x="747" y="174">ChatService</text>
  <text class="small" x="748" y="194">interface</text>

  <rect class="api" x="700" y="285" width="190" height="64"/>
  <text class="text" x="738" y="314">ChatApiService</text>
  <text class="small" x="728" y="334">OkHttp SSE + REST</text>

  <rect class="backend" x="700" y="425" width="190" height="64"/>
  <text class="text" x="760" y="462">Backend</text>

  <rect class="box" x="360" y="95" width="190" height="64"/>
  <text class="text" x="406" y="132">ChatUiState</text>

  <rect class="box" x="360" y="385" width="190" height="64"/>
  <text class="text" x="412" y="422">ChatScreen</text>

  <path class="edge" d="M170 159 L170 215"/>
  <path class="edge" d="M260 247 L360 247"/>
  <path class="edge" d="M550 235 C610 215 640 190 700 177"/>
  <path class="edge" d="M795 209 L795 285"/>
  <path class="edge" d="M795 349 L795 425"/>
  <text class="label" x="810" y="387">SSE /api/chat</text>
  <path class="edge" d="M890 320 C940 350 940 430 890 455"/>
  <text class="label" x="900" y="397">REST cart/products</text>
  <path class="edge" d="M455 215 L455 159"/>
  <path class="edge" d="M455 279 L455 385"/>
  <path class="edge" d="M360 127 C285 127 260 190 260 230"/>
</svg>
