services:
  mysql:
    image: mysql:8
    container_name: ecommerce-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-ecommerce123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ecommerce_agent}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-uroot",
          "-p${MYSQL_PASSWORD:-ecommerce123}",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  mysql_data:
